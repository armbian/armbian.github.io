name: "Infrastructure: Cache servers JSONs"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate:
    name: "Generate JSON from NetBox"
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'Armbian' }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout armbian.github.io repository
        uses: actions/checkout@v6
        with:
          repository: armbian/armbian.github.io
          fetch-depth: 0
          clean: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: "Generate JSON from NetBox"
        id: prepare-urls
        run: |

          set -euo pipefail

          BASE_URL="${{ secrets.NETBOX_API }}/virtualization/virtual-machines/?limit=0&name__empty=false&status=active"

          # One jq filter used for all kinds – same fields everywhere
          JQ_FILTER='
            .results
            | map(
                select(.name != null)
                | {
                    host: .name,
                    upload_path: (.custom_fields["path"] // ""),

                    download_path_archive:
                      ((.custom_fields["download_path_archive"] // "/archive")
                        | if startswith("/") then . else "/" + . end),

                    download_path_images:
                      ((.custom_fields["download_path_images"] // "/dl")
                        | if startswith("/") then . else "/" + . end),

                    download_path_debs:
                      ((.custom_fields["download_path_debs"] // "/apt")
                        | if startswith("/") then . else "/" + . end),

                    port: (.custom_fields["port"] // 22),
                    username: (.custom_fields["username"] // "mirror")
                  }
              )
            | sort_by(.host)
          '

          for kind in download cache upload; do
            case "$kind" in
              download)
                # Mirrors used as HTTP download sources (webseeds)
                url="$BASE_URL&device_role=Mirror&tag=images"
                outfile="download.jq"
                ;;
              cache)
                # Cache mirrors (can be used for HTTP + rsync)
                url="$BASE_URL&device_role=Mirror&tag=cache"
                outfile="cache.jq"
                ;;
              upload)
                # Upload targets (SSH)
                url="$BASE_URL&tag=upload&tag=images"
                outfile="upload.jq"
                ;;
            esac

            echo "Generating $outfile from $url"

            # Retry on transient failures; --fail turns HTTP 4xx/5xx into errors.
            # -sS: quiet progress but still print the error reason on failure.
            response="$(curl -sS --fail \
              --connect-timeout 10 --max-time 60 \
              --retry 5 --retry-delay 2 --retry-all-errors \
              -H "Authorization: Token ${{ secrets.NETBOX_TOKEN }}" \
              -H "Accept: application/json; indent=4" \
              "$url")"

            echo "$response" | jq "$JQ_FILTER" > "$outfile"

            # Guard against a valid-but-empty result set.
            count="$(jq 'length' "$outfile")"
            if [ "$count" -eq 0 ]; then
              echo "::error::$outfile is empty (NetBox returned no '$kind' servers from $url)"
              exit 1
            fi
            echo "  -> $count server(s)"

          done

          # --- Self-hosted GitHub runners ---
          # VMs with role "Userlevel runner"; cache host name and runner count.
          # NetBox's virtual-machines endpoint ignores `device_role` (a Device
          # filter), so we fetch all active VMs and filter on the role name in
          # jq to avoid pulling in unrelated roles (e.g. "Virtual machine").
          runners_url="$BASE_URL"
          runners_outfile="github-runners.jq"

          RUNNERS_JQ_FILTER='
            .results
            | map(
                select(.name != null and ((.role.name? // "") == "Userlevel runner"))
                | {
                    host: ((.custom_fields["github_label"] // "" | gsub("^\\s+|\\s+$";"") | select(. != "")) // .name),
                    runners: (.custom_fields["runners"] // 0),
                    vcpus: ((.vcpus // 0) | round),
                    memory: (.memory // 0),
                    apt_proxy: (.custom_fields["apt_proxy"] // ""),
                    oci_cache: (.custom_fields["oci_cache"] // ""),
                    redis_cache: (.custom_fields["redis_cache"] // ""),
                    git_proxy: (.custom_fields["git_proxy"] // "")
                  }
              )
            | sort_by(.host)
          '

          echo "Generating $runners_outfile from $runners_url"

          # Retry on transient failures; --fail turns HTTP 4xx/5xx into errors.
          # -sS: quiet progress but still print the error reason on failure.
          response="$(curl -sS --fail \
            --connect-timeout 10 --max-time 60 \
            --retry 5 --retry-delay 2 --retry-all-errors \
            -H "Authorization: Token ${{ secrets.NETBOX_TOKEN }}" \
            -H "Accept: application/json; indent=4" \
            "$runners_url")"

          echo "$response" | jq "$RUNNERS_JQ_FILTER" > "$runners_outfile"

          # Guard against a valid-but-empty result set: committing an empty
          # runner list to the data branch would poison every downstream reader.
          count="$(jq 'length' "$runners_outfile")"
          if [ "$count" -eq 0 ]; then
            echo "::error::$runners_outfile is empty (NetBox returned no 'Userlevel runner' VMs from $runners_url)"
            exit 1
          fi
          echo "  -> $count runner host(s)"

      - name: Display generated JSON files
        run: |
          {
            echo "### download.jq"
            echo "\`\`\`json"
            cat download.jq
            echo "\`\`\`"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "### cache.jq"
            echo "\`\`\`json"
            cat cache.jq
            echo "\`\`\`"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "### upload.jq"
            echo "\`\`\`json"
            cat upload.jq
            echo "\`\`\`"
            echo ""
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "### github-runners.jq"
            echo "\`\`\`json"
            cat github-runners.jq
            echo "\`\`\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Commit changes if any
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github"

          # Save the generated files to a temp directory
          mkdir -p /tmp/json-files
          cp *.jq /tmp/json-files/

          git fetch origin data
          git checkout data

          # Restore the generated files
          mkdir -p data/servers
          cp /tmp/json-files/*.jq data/servers/

          git add data/servers/
          if ! git diff --cached --quiet; then
            git commit -m "Update server JSONs from NetBox"
            # Push with retry logic
            max_attempts=3
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if git push origin data; then
                echo "Successfully pushed to data branch"
                exit 0
              fi

              # Pull with rebase to resolve conflicts
              echo "Push failed, attempting to pull and rebase..." >&2
              if ! git pull --rebase origin data; then
                echo "Pull/rebase failed, will retry push..." >&2
              fi

              attempt=$((attempt + 1))
            done

            echo "Failed to push after $max_attempts attempts" >&2
            exit 1
          fi

      - name: Trigger webindex-update workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: "Web: Directory listing"
