name: "Infrastructure: Enable Hetzner ARM64 runners"
on:
  workflow_dispatch:
    inputs:
      machine_count:
        description: "Number of Hetzner VMs to provision"
        required: false
        type: choice
        default: "4"
        options:
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"
      server_type:
        description: "Hetzner server type (auto-falls back on capacity shortage)"
        required: false
        type: choice
        default: "cax41"
        options:
          - "cax41"
          - "cax31"
          - "cax21"

concurrency:
  group: hetzner-runner
  cancel-in-progress: false

jobs:
  # Main jobs
  Teamcheck:
    permissions:
      actions: write
    if: |
      github.repository_owner == 'Armbian' &&
      github.actor == 'igorpecovnik'
    runs-on: Linux
    steps:

    - name: "Check membership"
      uses: armbian/actions/team-check@main
      with:
        ORG_MEMBERS: ${{ secrets.ORG_MEMBERS }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TEAM: "Release manager"

  Prepare:
    needs: Teamcheck
    name: "Prepare matrix"
    outputs:
      matrix: ${{steps.matrix.outputs.matrix}}
    runs-on: Linux
    steps:

      - name: Generate matrix
        id: matrix
        run: |
          # inputs.* is populated on workflow_dispatch (UI / gh workflow run);
          # empty when the workflow is triggered any other way (repository_dispatch,
          # API without inputs, etc.). Fall back to 4 so the legacy "no args"
          # call shape keeps working.
          count=${{ inputs.machine_count || '4' }}
          echo "Generating matrix for ${count} server(s)"
          matrix=$(seq 0 $(( count - 1 )) | jq -cnR '[inputs | tonumber]')
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT
          echo "Matrix: ${matrix}"

  Create:
    name: "Server ${{ matrix.index }}"
    runs-on: ubuntu-latest
    needs: Prepare
    if: |
      github.repository_owner == 'Armbian' &&
      github.actor == 'igorpecovnik'
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        index: ${{fromJson(needs.Prepare.outputs.matrix)}}
    steps:

      - name: Create Hetzner server
        uses: armbian/actions/hetzner@main
        with:
          action: create
          server-type: "${{ inputs.server_type || 'cax41' }}"
          index: "${{ matrix.index }}"
          delete-existing: "true"
          ssh-key: "UPLOAD"
          hetzner-token: ${{ secrets.HETZNER_ONE }}
          github-token: ${{ secrets.HETZNER_RUNNER }}
          runner-count: "${{ env.RUNNER_COUNT || '4' }}"

  Work:
    name: "Work ${{ matrix.index }}"
    runs-on: Linux
    needs: [Prepare, Create]
    if: |
      github.repository_owner == 'Armbian' &&
      github.actor == 'igorpecovnik'
    strategy:
      fail-fast: false
      matrix:
        index: ${{fromJson(needs.Prepare.outputs.matrix)}}
    steps:
      - name: Sleep until cleanup
        run: sleep "${{ env.PERIOD || '60m' }}"

  Cleaning:
    name: "Cleanup ${{ matrix.index }}"
    runs-on: ubuntu-latest
    needs: [Prepare, Create, Work]
    if: |
      always() &&
      github.repository_owner == 'Armbian' &&
      github.actor == 'igorpecovnik'
    strategy:
      fail-fast: false
      matrix:
        index: ${{fromJson(needs.Prepare.outputs.matrix)}}
    steps:
      - name: Delete Hetzner server
        uses: armbian/actions/hetzner@main
        with:
          action: delete
          server-type: "${{ inputs.server_type || 'cax41' }}"
          index: "${{ matrix.index }}"
          hetzner-token: ${{ secrets.HETZNER_ONE }}
