#
# debs.armbian.com
#
geodb: /scripts/redirect-config/GeoLite2-City.mmdb
asndb: /scripts/redirect-config/GeoLite2-ASN.mmdb
dl_map: /scripts/redirect-config/all-images.json

# Reload authorization key
reloadKey: 25f472f809876a69353f7fb03e95b625

# LRU Cache Size (in items)
cacheSize: 2048

# Documentation: https://github.com/armbian/armbian-router

specialExtensions:
  - boot-sms.img.xz: -boot-sms
  - boot-boe.img.xz: -boot-boe
  - boot-csot.img.xz: -boot-csot
  - rootfs.img.xz: -rootfs
  - img.qcow2: -qcow2
  - img.qcow2.xz: -qcow2
  - boot.bin.xz: -uboot-bin
  - hyperv.zip: -hyperv

servers:

  # Europe/Berlin - 1000 Mbit/s
  - server: fi.mirror.armbian.de/apt/
    latitude: 51.2993
    longitude: 9.491
    weight: 10

  # Europe/Moscow - 2000 Mbit/s
  - server: stpete-mirror.armbian.com/apt/
    rules:
      - field: location.country.iso_code
        not_in:
          - UA
    latitude: 59.9417
    longitude: 30.3096
    weight: 10

  # Asia/Taipei - 50000 Mbit/s
  - server: mirror.twds.com.tw/armbian-apt/
    latitude: 25.0382
    longitude: 121.5636

  # Europe/Berlin - 2500 Mbit/s
  - server: netcup-02.armbian.com/apt/
    latitude: 49.4478
    longitude: 11.0683
    weight: 10

  # Europe/Berlin - 2500 Mbit/s
  - server: netcup-03.armbian.com/apt/
    latitude: 49.4478
    longitude: 11.0683
    weight: 10
