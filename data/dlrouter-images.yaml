#
# images.armbian.com
#
geodb: /scripts/redirect-config/GeoLite2-City.mmdb
asndb: /scripts/redirect-config/GeoLite2-ASN.mmdb
dl_map: /scripts/redirect-config/all-images.json
certDataPath: /scripts/redirect-config/certdata.txt
bind: ':8081'
enableProfiler: true

# Reload authorization key
reloadKey: 594492598d08ea02b310375b686291a5

# LRU Cache Size (in items)
cacheSize: 2048

# Documentation: https://github.com/armbian/armbian-router

specialExtensions:
  - boot-sms.img.xz: -boot-sms
  - boot-boe.img.xz: -boot-boe
  - boot-csot.img.xz: -boot-csot
  - rootfs.img.xz: -rootfs
  - img.qcow2: -qcow2
  - img.qcow2.xz: -qcow2
  - boot.bin.xz: -boot
  - u-boot.rom.xz: -u-boot-rom
  - hyperv.zip: -hyperv
  - hyperv.zip.xz: -hyperv
  - hyperv.img.xz: -hyperv
  - fip.img.xz: -fip
  - lk.bin.xz: -lk-bin
  - boe.img.xz: -boe
  - csot.img.xz: -csot
  - kebab.img.xz: -kebab
  - recovery.img.xz: -recovery

servers:

  # Europe/Moscow - 2000 Mbit/s
  - server: stpete-mirror.armbian.com/dl/
    rules:
      - field: location.country.iso_code
        not_in:
          - UA
    latitude: 59.9417
    longitude: 30.3096
    weight: 10

  # Europe/Rome - 2500 Mbit/s
  - server: armbian.atomonetworks.com/dl/
    latitude: 38.157745
    longitude: 13.195175
    weight: 10

  # Europe/Kiev - 20000 Mbit/s
  - server: mirror.hostiko.network/armbian-dl/
    rules:
      - field: location.country.iso_code
        not_in:
          - RU
    latitude: 50.4547
    longitude: 30.5238
    weight: 10

  # Europe/Copenhagen - 1000 Mbit/s
  - server: mirrors.c0urier.net/linux/armbian/dl/
    rules:
      - field: location.country.iso_code
        not_in:
          - RU
    latitude: 56.0656
    longitude: 12.2851
    weight: 10
